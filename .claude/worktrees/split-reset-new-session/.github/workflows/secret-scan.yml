name: Secret & PII Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets and PII
        run: |
          echo "=== Secret & PII Scan ==="
          FAIL=0

          # 1. Azure Storage Account Keys
          if grep -rn --include='*.py' --include='*.sh' --include='*.json' --include='*.yml' \
            -E '(account_key|STORAGE_KEY|storage_key|credential)\s*[=:]\s*"[A-Za-z0-9+/]{40,}={0,2}"' . --exclude-dir=.git; then
            echo "::error::BLOCKED: Azure Storage Account Key detected"
            FAIL=1
          fi

          # 2. Azure Subscription IDs
          if grep -rn --include='*.py' --include='*.sh' --include='*.json' --include='*.yml' \
            -E 'subscription[_-]?id\s*[=:]\s*"?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' . --exclude-dir=.git; then
            echo "::error::BLOCKED: Azure Subscription ID detected"
            FAIL=1
          fi

          # 3. SAS tokens in URLs
          if grep -rn --include='*.py' --include='*.sh' --include='*.json' --include='*.yml' \
            -E 'sig=[A-Za-z0-9%+/]{20,}' . --exclude-dir=.git; then
            echo "::error::BLOCKED: SAS token signature detected"
            FAIL=1
          fi

          # 4. AWS keys
          if grep -rn -E '(AKIA[0-9A-Z]{16}|aws_secret_access_key\s*=)' . --exclude-dir=.git --exclude-dir=.github; then
            echo "::error::BLOCKED: AWS credential detected"
            FAIL=1
          fi

          # 5. Generic API keys/tokens
          if grep -rn --include='*.py' --include='*.json' \
            -E '(api_key|API_KEY|token|TOKEN|secret|SECRET)\s*[=:]\s*"[A-Za-z0-9+/]{30,}={0,2}"' . --exclude-dir=.git; then
            echo "::error::BLOCKED: API key or token detected"
            FAIL=1
          fi

          # 6. Private keys
          if grep -rn -l 'BEGIN.*PRIVATE KEY' . --exclude-dir=.git --exclude-dir=.github; then
            echo "::error::BLOCKED: Private key file detected"
            FAIL=1
          fi

          # 7. Personal paths
          if grep -rn --include='*.py' --include='*.sh' --include='*.json' \
            -E 'C:\\Users\\[a-zA-Z]+\\' . --exclude-dir=.git --exclude='CLAUDE.md'; then
            echo "::error::BLOCKED: Personal file path detected"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo "PUSH BLOCKED: Fix the above issues first."
            exit 1
          fi

          echo "All checks passed."
